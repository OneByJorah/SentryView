version: '3.8'

services:
  # ===== FRONTEND =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rtsp-nvr-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - REACT_APP_API_URL=${BACKEND_URL:-http://backend:5000}
    depends_on:
      - backend
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    volumes:
      - /var/log/rtsp-nvr/frontend:/var/log/rtsp-nvr/frontend

  # ===== BACKEND =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtsp-nvr-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:***@db:5432/rtsp_nvr}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key}
      - TAILSCALE_API_KEY=${TAILSCALE_API_KEY:-}
      - TAILSCALE_TAILNET_ID=${TAILSCALE_TAILNET_ID:-}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    volumes:
      - /var/log/rtsp-nvr/backend:/var/log/rtsp-nvr/backend

  # ===== DATABASE (PostgreSQL with pgvector) =====
  db:
    image: postgres:15-alpine
    container_name: rtsp-nvr-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_change_me}
      - POSTGRES_DB=rtsp_nvr
    volumes:
      - rtsp-nvr-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - rtsp-nvr-network
    restart: unless-stopped

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: rtsp-nvr-redis
    command: redis-server --appendonly yes
    volumes:
      - rtsp-nvr-redis:/data
    networks:
      - rtsp-nvr-network
    restart: unless-stopped

  # ===== FFmpeg =====
  ffmpeg:
    build:
      context: ./ffmpeg
      dockerfile: Dockerfile
    container_name: rtsp-nvr-ffmpeg
    environment:
      - INPUT_URL=${RTSP_URL:-rtsp://example.com/stream}
      - OUTPUT_PATH=/output
    volumes:
      - rtsp-nvr-ffmpeg:/output:rw
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    depends_on:
      - backend

  # ===== TAILSCALE (for secure remote access) =====
  tailscale:
    image: tailscale/tailscale:latest
    container_name: rtsp-nvr-tailscale
    environment:
      - TS_AUTH_KEY=${TAILSCALE_AUTH_KEY:-}
      - TAILSCALE_STATE_DIR=/tailscale
    volumes:
      - rtsp-nvr-tailscale:/tailscale
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    # Only run if TAILSCALE_AUTH_KEY is set
    condition: service_healthy

  # ===== BACKUP (scheduled) =====
  backup:
    image: alpine:latest
    container_name: rtsp-nvr-backup
    command: >
      sh -c "
      while true; do
        date +\"%Y%m%d_%H%M%S\" > /tmp/backup_timestamp.txt;
        pg_dump -h db -U admin rtsp_nvr > /tmp/backup_$$(cat /tmp/backup_timestamp.txt).sql;
        tar -czf /backups/backup_$$(cat /tmp/backup_timestamp.txt).tar.gz /tmp/backup_*.sql;
        rm -f /tmp/backup_*.sql;
        sleep 24h;
      done
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-}
    volumes:
      - rtsp-nvr-backup:/backups
      - rtsp-nvr-data:/var/lib/postgresql/data:ro
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 3

networks:
  rtsp-nvr-network:
    driver: bridge
    name: rtsp-nvr-network

volumes:
  rtsp-nvr-data:
    name: rtsp-nvr-data
  rtsp-nvr-redis:
    name: rtsp-nvr-redis
  rtsp-nvr-ffmpeg:
    name: rtsp-nvr-ffmpeg
  rtsp-nvr-backup:
    name: rtsp-nvr-backup
  rtsp-nvr-tailscale:
    name: rtsp-nvr-tailscale
