services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rtsp-nvr-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - REACT_APP_API_URL=${BACKEND_URL:-http://backend:5000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtsp-nvr-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-secure_password_change_me}@db:5432/rtsp_nvr
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-jwt-secret}
      - TAILSCALE_API_KEY=${TAILSCALE_API_KEY:-}
      - TAILSCALE_TAILNET_ID=${TAILSCALE_TAILNET_ID:-}
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    volumes:
      - backend-logs:/var/log/rtsp-nvr/backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:15-alpine
    container_name: rtsp-nvr-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_change_me}
      - POSTGRES_DB=rtsp_nvr
    volumes:
      - rtsp-nvr-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d rtsp_nvr"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: rtsp-nvr-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - rtsp-nvr-redis:/data
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  ffmpeg:
    build:
      context: ./ffmpeg
      dockerfile: Dockerfile
    container_name: rtsp-nvr-ffmpeg
    environment:
      - INPUT_URL=${RTSP_URL:-rtsp://example.com/stream}
      - OUTPUT_PATH=/output
      - BACKEND_URL=http://backend:5000
    volumes:
      - rtsp-nvr-ffmpeg:/output:rw
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    depends_on:
      - backend

  backup:
    image: postgres:15-alpine
    container_name: rtsp-nvr-backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 2 * * * PGPASSWORD='${POSTGRES_PASSWORD:-secure_password_change_me}' pg_dump -h db -U admin -Fc rtsp_nvr > /backups/backup_\$(date +%Y%m%d_%H%M%S).dump 2>> /backups/backup.log" | crontab -
        crond -f -l 2
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:-secure_password_change_me}
      - POSTGRES_USER=admin
      - POSTGRES_DB=rtsp_nvr
    volumes:
      - rtsp-nvr-backup:/backups
    networks:
      - rtsp-nvr-network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

networks:
  rtsp-nvr-network:
    driver: bridge
    name: rtsp-nvr-network

volumes:
  rtsp-nvr-data:
    name: rtsp-nvr-data
  rtsp-nvr-redis:
    name: rtsp-nvr-redis
  rtsp-nvr-ffmpeg:
    name: rtsp-nvr-ffmpeg
  rtsp-nvr-backup:
    name: rtsp-nvr-backup
  backend-logs:
    name: rtsp-nvr-backend-logs
